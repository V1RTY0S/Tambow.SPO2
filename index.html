<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация и Вход</title>
    
    <!-- Подключаем библиотеку для анимации -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        /* === ОБЩИЕ СТИЛИ === */
        body {
            font-family: sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; background-color: #f4f6fa; margin: 0;
        }

        .container {
            width: 320px; max-width: 95vw; padding: 40px;
            border-radius: 12px; box-shadow: rgba(0, 0, 0, 0.1) 0px 4px 20px;
            text-align: center; position: relative;
        }

        h2 { color: #333; margin-bottom: 5px; }
        p.subtitle { color: #666; font-size: 14px; margin-top: 0; margin-bottom: 25px; }

        input { 
            width: 100%;
            padding: 12px; margin-bottom: 15px;
            border: 1px solid #e1e1e1; border-radius: 8px;
            box-sizing: border-box; font-size: 16px;
        }

        button { 
            width: 100%; padding: 12px;
            background: #4CAF50; color: white; border: none; border-radius: 8px;
            cursor: pointer; font-weight: bold; transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }

        /* === СООБЩЕНИЯ О СТАТУСЕ === */
        .status { 
            margin-top: 15px; padding: 10px; border-radius: 5px;
            font-size: 14px; display: none;
        }
        .success { background: #d1fae5; color: #065f46; }
        .error { background: #fee2e2; color: #991b1b; }

        /* === ПЕРЕКЛЮЧАТЕЛЬ ФОРМ === */
        .links {
            margin-top: 20px; font-size: 14px;
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 0 20px; line-height: 1.7;
        }
        .links a { color: #3b82f6; text-decoration: none; cursor: pointer; }

        /* === АНИМАЦИЯ ПОКАЗА ФОРМЫ === */
        .form-group {
            animation-duration: 0.3s; animation-fill-mode: forwards;
            visibility: hidden; opacity: 0;
        }

        /* По умолчанию показываем форму входа */
        .login-form.show-text,
        .register-form.registering.show-text {
            visibility: visible; opacity: 1;
            animation-name: fadeInUp;
        }

        /* Кнопка показа пароля */
        .password-toggle {
            position: absolute; top: calc(50% + 10px); right: 10px;
            font-size: 18px; cursor: pointer; user-select: none;
            color: #aaa; transition: color 0.2s;
        }
        .password-toggle:hover { color: #666; }
    </style>
</head>
<body>
<div class="container">
    <!-- Контейнер для двух форм -->
    <div id="auth-container">
        <!-- Форма ВХОДА (по умолчанию сверху) -->
        <div class="form-group login-form show-text">
            <h2 id="login-title">Вход в аккаунт</h2>
            <p class="subtitle" id="login-subtitle">Войдите, чтобы продолжить.</p>
            <form id="submit-form">
                <input type="email" id="email" placeholder="Email" required autocomplete="username">
                <input type="password" id="password" placeholder="Пароль" minlength="6" required autocomplete="current-password">
                <span class="password-toggle" onclick="togglePasswordVisibility()">🔒 Показать</span>
                <button type="submit" id="action-btn">Войти</button>
            </form>
        </div>
        
        <!-- Форма РЕГИСТРАЦИИ (скрыта по умолчанию) -->
        <div class="form-group register-form">
            <h2 id="register-title">Создать аккаунт</h2>
            <p class="subtitle" id="register-subtitle">Зарегистрируйтесь, чтобы получить доступ к редактору.</p>
            <form id="submit-form">
                <input type="email" id="email" placeholder="Email" required autocomplete="username">
                <input type="password" id="password" placeholder="Придумайте пароль" minlength="6" required autocomplete="new-password">
                <span class="password-toggle" onclick="togglePasswordVisibility()">🔒 Показать</span>
                <button type="submit" id="action-btn">Зарегистрироваться</button>
            </form>
        </div>
    </div>

    <!-- Переключатель между формами -->
    <div class="links" id="switch-link">
        <!-- Эти ссылки будут динамически меняться -->
    </div>

    <!-- Сообщения об успехе или ошибке -->
    <div id="message-box" class="status"></div>
</div>

<!-- Библиотека Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// === НАСТРОЙКА SUPABASE ===

// ВАЖНО! ЗАМЕНИТЕ ЭТИ МЕСТОЗАХВАТЫ НА ДАННЫЕ ИЗ ВАШЕЙ ПАНЕЛИ УПРАВЛЕНИЯ!
const supabaseUrl = 'ВАШ_URL_ИЗ_SUPABASE'; // Пример: https://myproject.supabase.co
const supabaseKey = 'ВАШ_PUBLIC_ANON_KEY_ИЗ_SUPABASE'; // Очень длинная строка, начинается с eyJ...

const supabase = supabase.createClient(supabaseUrl, supabaseKey);
let isRegistering = false; // По умолчанию показываем форму входа

// === ПОДКЛЮЧЕНИЕ ЭЛЕМЕНТОВ DOM ===

const formContainer = document.getElementById('auth-container');
const emailInput = document.getElementById('email');
const passwordInput = document.getElementById('password');
const actionBtn = document.getElementById('action-btn');
const messageBox = document.getElementById('message-box');
const switchLinkEl = document.getElementById('switch-link'); // Новый элемент

/**
 * Отображает сообщения пользователю.
 * @param {string} text Текст сообщения.
 * @param {'success' | 'error'} type Тип сообщения.
 */
function showMessage(text, type) {
    messageBox.textContent = text;
    messageBox.className = `status ${type}`;
    messageBox.style.display = 'block';
}

/**
 * Включает/выключает видимость пароля.
 */
function togglePasswordVisibility() {
    const passField = document.getElementById('password');
    if (passField.type === 'password') {
        passField.type = 'text';
        this.innerText = '🔐 Скрыть';
    } else {
        passField.type = 'password';
        this.innerText = '🔒 Показать';
    }
}

/**
 * Переключает интерфейс на форму регистрации.
 */
function showRegister() {
    if (!isRegistering) {
        isRegistering = true;
        // Прячем старую форму и показываем новую
        document.querySelector('.login-form').classList.remove('show-text');
        document.querySelector('.register-form').classList.add('show-text');

        // Меняем текст ссылок внизу
        switchLinkEl.innerHTML = `
            Уже есть аккаунт? <a onclick="showLogin()">Войти здесь</a>
        `;
    }
}

/**
 * Переключает интерфейс на форму входа.
 */
function showLogin() {
    if (isRegistering) {
        isRegistering = false;
        // Прячем старую форму и показываем новую
        document.querySelector('.register-form').classList.remove('show-text');
        document.querySelector('.login-form').classList.add('show-text');

        // Меняем текст ссылок внизу
        switchLinkEl.innerHTML = `
            Нет аккаунта? <a onclick="showRegister()">Зарегистрироваться</a>
        `;
    }
}

// === ОСНОВА: РАЗРЕШЕНИЕ ФОРМЫ ===

formContainer.addEventListener('submit', async function(e) {
    e.preventDefault(); // Блокируем стандартную отправку

    const email = emailInput.value.trim();
    const password = passwordInput.value;

    // Проверяем валидность данных перед запросом
    if (!email || !password) {
        showMessage('Заполните все поля.', 'error');
        return;
    }

    actionBtn.disabled = true;
    actionBtn.textContent = 'Подождите...';
    messageBox.style.display = 'none';

    let result;
    try {
        if (isRegistering) {
            // 📩 РЕГИСТРАЦИЯ: Создаем пользователя
            result = await supabase.auth.signUp({
                email,
                password,
                options: {
                    emailRedirectTo: window.location.origin // Куда вернуть после подтверждения почты (если включено)
                }
            });
        } else {
            // 🚪 АВТОРИЗАЦИЯ: Проверяем почту и пароль
            result = await supabase.auth.signInWithPassword({ email, password });
        }
    } catch (err) {
        console.error(err);
        showMessage('Ошибка сервера. Попробуйте позже.', 'error');
        return;
    }

    actionBtn.disabled = false;
    actionBtn.textContent = isRegistering ? 'Зарегистрироваться' : 'Войти';

    if (result.error) {
        // Обрабатываем ошибки от Supabase
        switch(result.error.message) {
            case 'Email already signed up':
                showMessage('Пользователь с таким Email уже существует.', 'error');
                break;
            default:
                showMessage(result.error.message, 'error');
        }
    } else {
        // При успешной регистрации сессия создается мгновенно (Confirm email отключено)
        const session = result.data.session;
        const user = result.data.user;

        if (session && user) {
            // ✅ Авторизация прошла успешно
            showMessage(isRegistering 
                ? 'Аккаунт создан! Вы вошли.'
                : 'Добро пожаловать!', 'success'
            );
            
            // Демо-код: выводим ID пользователя через 1 секунду
            setTimeout(() => alert(`ID пользователя: ${user.id}`), 1000);

            // Через 2 секунды переходим на другую страницу
            setTimeout(() => {
                window.location.href = "editor.html"; // Ваш сайт
            }, 2000);
        } else {
            // ❌ Ошибка: нет сессии (это должно быть невозможно при Confirm email off)
            showMessage('Не удалось войти. Проверьте настройки Supabase.', 'error');
        }
    }
});

// === ПРОСЛУШИВАНИЕ СОБЫТИЯ ЗАГРУЗКИ ===

window.addEventListener('load', () => {
    // Проверяем, есть ли у нас активная сессия
    const currentUser = supabase.auth.user();
    const currentSession = supabase.auth.session();

    if (currentUser && currentSession) {
        // Пользователь уже авторизован
        showMessage('Вы уже вошли в систему.', 'success');
        setTimeout(() => {
            window.location.href = "index.html";
        }, 1500);
    } else {
        // Это первая загрузка страницы, инициализируем форму входа
        showLogin();
    }
});
</script>

</body>
</html>
