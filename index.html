<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Новый пароль · Supabase Auth</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg: #0e1015;
    --card: #161a22;
    --card-border: #232836;
    --text: #e7eaf0;
    --muted: #8890a0;
    --accent: #5eead4;
    --accent-dim: rgba(94,234,212,0.12);
    --error: #ff6b6b;
    --error-dim: rgba(255,107,107,0.1);
    --radius: 14px;
  }
  *{ box-sizing: border-box; }
  body{
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(circle at 20% 10%, rgba(94,234,212,0.06), transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(94,234,212,0.05), transparent 45%),
      var(--bg);
    font-family: 'Inter', sans-serif;
    color: var(--text);
    padding: 24px;
  }
  .wrap{ width: 100%; max-width: 400px; }
  .card{
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    padding: 32px 28px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.35);
  }
  h1{
    font-family: 'Space Grotesk', sans-serif;
    font-size: 24px;
    font-weight: 600;
    margin: 0 0 6px;
    letter-spacing: -0.01em;
  }
  .subtitle{ color: var(--muted); font-size: 13.5px; margin: 0 0 26px; line-height: 1.5; }
  form{ display: flex; flex-direction: column; gap: 14px; }
  label{ font-size: 12px; font-weight: 500; color: var(--muted); margin-bottom: 6px; display: block; }
  .field{ display: flex; flex-direction: column; }
  input{
    background: #0e1015;
    border: 1px solid var(--card-border);
    border-radius: 9px;
    padding: 11px 13px;
    font-size: 14px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }
  input::placeholder{ color: #4b5265; }
  input:focus, input:focus-visible{
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }
  button[type="submit"]{
    margin-top: 8px;
    background: var(--accent);
    color: #0e1015;
    border: none;
    border-radius: 9px;
    padding: 12px;
    font-size: 14px;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: filter 0.15s ease, transform 0.1s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  button[type="submit"]:hover{ filter: brightness(1.08); }
  button[type="submit"]:active{ transform: scale(0.99); }
  button[type="submit"]:disabled{ opacity: 0.6; cursor: not-allowed; }
  button[type="submit"]:focus-visible{ outline: 2px solid var(--accent); outline-offset: 2px; }
  .spinner{
    width: 14px; height: 14px;
    border: 2px solid rgba(14,16,21,0.3);
    border-top-color: #0e1015;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  .spinner.show{ display: inline-block; }
  @keyframes spin{ to{ transform: rotate(360deg); } }
  .message{
    font-size: 13px;
    padding: 10px 12px;
    border-radius: 8px;
    margin-top: 4px;
    line-height: 1.5;
    display: none;
  }
  .message.show{ display: block; }
  .message.error{ background: var(--error-dim); color: var(--error); border: 1px solid rgba(255,107,107,0.25); }
  .message.success{ background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(94,234,212,0.25); }
  @media (prefers-reduced-motion: reduce){ .spinner{ animation: spin 1.2s linear infinite; } }
</style>
</head>
<body>

<div class="wrap">
  <div class="card">
    <h1>Новый пароль</h1>
    <p class="subtitle" id="subtitle">Придумайте новый пароль для входа</p>

    <div class="message" id="msgBox"></div>

    <form id="resetForm">
      <div class="field">
        <label for="password">Новый пароль</label>
        <input type="password" id="password" placeholder="••••••••" required minlength="6" autocomplete="new-password">
      </div>
      <div class="field">
        <label for="password2">Повторите пароль</label>
        <input type="password" id="password2" placeholder="••••••••" required minlength="6" autocomplete="new-password">
      </div>

      <button type="submit" id="submitBtn">
        <span class="spinner" id="spinner"></span>
        <span id="submitLabel">Сохранить пароль</span>
      </button>
    </form>
  </div>
</div>

<script>
  // ==== НАСТРОЙКИ SUPABASE ====
  const SUPABASE_URL = 'https://crirmkysumirbdsjdwdz.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_s0iVxglyGlPFd-4Ni2mpjw_n6iD3OZb';

  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const form = document.getElementById('resetForm');
  const passwordInput = document.getElementById('password');
  const password2Input = document.getElementById('password2');
  const submitBtn = document.getElementById('submitBtn');
  const spinner = document.getElementById('spinner');
  const msgBox = document.getElementById('msgBox');
  const subtitle = document.getElementById('subtitle');

  function showMessage(text, type){
    msgBox.textContent = text;
    msgBox.className = 'message show ' + type;
  }
  function setLoading(isLoading){
    submitBtn.disabled = isLoading;
    spinner.classList.toggle('show', isLoading);
  }

  // Supabase сам обрабатывает токен восстановления из ссылки в письме
  // и создаёт временную сессию с событием PASSWORD_RECOVERY.
  supabaseClient.auth.onAuthStateChange((event) => {
    if(event === 'PASSWORD_RECOVERY'){
      subtitle.textContent = 'Ссылка подтверждена. Введите новый пароль.';
    }
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const password = passwordInput.value;
    const password2 = password2Input.value;

    if(password !== password2){
      showMessage('Пароли не совпадают.', 'error');
      return;
    }
    if(password.length < 6){
      showMessage('Пароль должен содержать минимум 6 символов.', 'error');
      return;
    }

    setLoading(true);
    try{
      const { error } = await supabaseClient.auth.updateUser({ password });
      if(error) throw error;
      showMessage('Пароль изменён. Перенаправление…', 'success');
      setTimeout(() => {
        window.location.href = 'main.html';
      }, 800);
    } catch(err){
      showMessage(err.message || 'Не удалось изменить пароль. Попробуйте ещё раз.', 'error');
    } finally {
      setLoading(false);
    }
  });
</script>

</body>
</html>
